<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-2">
    <h2>Create Order</h2>
    <form th:action="@{/order/create}" method="post">
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" class="form-control" id="author" name="author" required/>
        </div>
        <div class="form-group">
            <label>Products</label>
            <select class="form-control" name="productIds" multiple required>
                <option th:each="product : ${products}"
                        th:value="${product.productId}"
                        th:text="${product.productName}">
                </option>
            </select>
            <small class="form-text text-muted">Hold Ctrl/Cmd to select multiple products.</small>
        </div>
        <button type="submit" class="btn btn-primary">Create Order</button>
        <a th:href="@{/order/history}" class="btn btn-secondary">Back</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
