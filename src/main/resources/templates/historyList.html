<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-2">
    <h2>Orders by <span th:text="${author}"></span></h2>
    <a th:href="@{/order/history}" class="btn btn-secondary btn-sm mb-3">Back</a>

    <div th:if="${orders.isEmpty()}">
        <p class="text-muted">No orders found for this author.</p>
    </div>

    <table th:if="${!orders.isEmpty()}" border="1" class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th scope="col">Order ID</th>
            <th scope="col">Author</th>
            <th scope="col">Status</th>
            <th scope="col">Order Time</th>
            <th scope="col">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.author}"></td>
            <td th:text="${order.status}"></td>
            <td th:text="${order.orderTime}"></td>
            <td>
                <a th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-success btn-sm">Pay</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
